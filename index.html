<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Калькулятор клінінга</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2d7aaf" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">WhiteRoom Home Services SRL</p>
        <h1>Калькулятор клінінга</h1>
        <p>Менеджер може додавати послуги, змінювати ціни та отримувати підсумок.</p>
      </div>
      <button id="installButton" class="install-button">Встановити</button>
    </header>

    <section class="panel panel-collapsible collapsed">
      <div class="panel-header">
        <button id="toggleCreateForm" class="panel-toggle" type="button">
          <span>Створити послугу</span>
          <span class="accordion-icon">▼</span>
        </button>
      </div>
      <div class="panel-body">
        <form id="serviceForm" class="service-form">
          <label>
            Категорія послуги
          <select id="serviceCategory">
            <option value="cleaning">Прибирання</option>
            <option value="extra">Додаткові послуги</option>
          </select>
        </label>
        <label id="cleaningLabel" class="subcategory-label">
          Тип прибирання
          <select id="serviceCleaningType">
            <option value="підтримуюче прибирання">Підтримуюче прибирання</option>
            <option value="Генеральне прибирання">Генеральне прибирання</option>
          </select>
        </label>
        <label id="extraLabel" class="subcategory-label" style="display: none;">
          Приміщення
          <select id="serviceRoom">
            <option value="кухня">Кухня</option>
            <option value="санвузол">Санвузол</option>
            <option value="вітальня">Вітальня</option>
            <option value="спальня">Спальня</option>
            <option value="балкон">Балкон</option>
            <option value="веранда">Веранда</option>
            <option value="подвір'я">Подвір'я</option>
          </select>
        </label>
        <label>
          Назва послуги
          <input id="serviceName" type="text" required placeholder="Прибирання кухні" />
        </label>
        <label>
          Назва послуги румунською (тільки для PDF)
          <input id="serviceNameRo" type="text" placeholder="Curățenie bucătărie" />
        </label>
        <div class="price-unit-row">
          <label>
            Ціна за одиницю (RON)
            <input id="servicePrice" type="number" min="0" step="0.01" required placeholder="250" />
          </label>
          <label>
            Одиниця виміру
            <select id="serviceUnit">
              <option value="м²">м²</option>
              <option value="год.">год.</option>
              <option value="шт.">шт.</option>
            </select>
          </label>
        </div>
        <button type="submit" class="primary">Додати послугу</button>
      </form>
      </div>
    </section>

    <section class="panel">
      <h2>Список послуг</h2>
      <div class="search-container">
        <input id="serviceSearch" type="text" placeholder="Пошук послуг..." />
      </div>
      <div id="servicesList" class="services-list"></div>
    </section>

    <section class="panel">
      <h2>Калькулятор</h2>
      <div id="orderPanel" class="order-panel"></div>
      <div class="surcharges">
        <label class="surcharge-item">
          <input type="checkbox" id="petSurcharge" />
          <span>Націнка за домашню тварину</span>
          <input type="number" id="petSurchargePercent" min="0" step="0.1" value="10" placeholder="10" />
          <span>%</span>
        </label>
        <label class="surcharge-item">
          <input type="checkbox" id="ecoChemistry" />
          <span>Екологічна хімія</span>
          <input type="number" id="ecoChemistryAmount" min="0" step="0.01" value="70" placeholder="70" />
          <span>RON</span>
        </label>
      </div>
      <div class="pdf-options">
        <label>
          Мова PDF
          <select id="pdfLanguage">
            <option value="uk">Українська</option>
            <option value="ro">Română</option>
          </select>
        </label>
      </div>
      <div class="total-card">
        <div>
          <p>Загальна сума</p>
          <strong id="orderTotal">RON 0.00</strong>
        </div>
        <div class="action-buttons">
          <button id="generatePdf" class="secondary">Генерувати PDF</button>
          <button id="clearSelection" class="secondary">Очистити вибір</button>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
